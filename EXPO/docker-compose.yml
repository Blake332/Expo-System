version: '3.8'

services:
  python-backend:
    build:
      context: ./services/python
      dockerfile: Dockerfile
    container_name: expo-python-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./expo_registration.db
      - DESK_API_KEY=${DESK_API_KEY:-change-me-desk-secret}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-change-me-admin-secret}
    volumes:
      - ./services/python:/app
      - ./expo_registration.db:/app/expo_registration.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - expo-network

  go-backend:
    build:
      context: ./services/go
      dockerfile: Dockerfile
    container_name: expo-go-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    volumes:
      - ./services/go:/app
    networks:
      - expo-network

  frontend:
    image: nginx:alpine
    container_name: expo-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/static:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - python-backend
      - go-backend
    networks:
      - expo-network

networks:
  expo-network:
    driver: bridge
