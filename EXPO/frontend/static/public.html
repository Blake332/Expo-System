<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Expo — Public Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #F9FAFB;
      --text-muted: #9CA3AF;
      --accent: #06b6d4;
      --accent-glow: rgba(6, 182, 212, 0.4);
      --secondary: #8b5cf6;
      --secondary-glow: rgba(139, 92, 246, 0.4);
      --warn: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    h1,
    h2,
    h3,
    .countdown,
    .stat {
      font-family: 'Outfit', sans-serif;
    }

    .bg-orbs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      width: 45vw;
      height: 45vw;
      background: var(--accent-glow);
      top: -10vw;
      left: -10vw;
      opacity: 0.6;
    }

    .orb-2 {
      width: 40vw;
      height: 40vw;
      background: var(--secondary-glow);
      bottom: -10vw;
      right: -5vw;
      opacity: 0.6;
      animation-delay: -5s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(8vw, 12vh) scale(1.15);
      }
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header {
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
      background: rgba(3, 7, 18, 0.5);
      backdrop-filter: blur(12px);
      animation: fadeUp 0.8s ease-out;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .lang button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter';
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .lang button:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .lang button.active {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
    }

    main {
      max-width: 1000px;
      margin: 4rem auto;
      padding: 0 2rem;
      display: grid;
      gap: 2rem;
      animation: fadeUp 0.8s ease-out 0.2s both;
      flex-grow: 1;
    }

    @media(min-width: 800px) {
      main {
        grid-template-columns: 1fr 1fr;
      }
    }

    .glass-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%), var(--card-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 40px 70px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .countdown {
      font-size: clamp(3rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1;
      margin: 1rem 0;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(6, 182, 212, 0.3));
    }

    .stat {
      font-size: 4rem;
      font-weight: 800;
      margin: 0.5rem 0;
      color: #fff;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
      line-height: 1;
    }

    .bars {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-top: 2rem;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 120px 1fr 50px;
      align-items: center;
      gap: 1rem;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .bar-bg {
      height: 12px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
      background: linear-gradient(90deg, var(--accent), var(--secondary));
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
    }

    .msg {
      margin-top: 2rem;
      padding: 1.25rem;
      border-radius: 16px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #fcd34d;
      font-size: 1rem;
      line-height: 1.5;
      white-space: pre-wrap;
      font-weight: 500;
    }

    .closed {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-weight: 600;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.85rem;
      padding: 3rem;
      margin-top: auto;
    }
  </style>
</head>

<body>
  <div id="particles-js" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-2; background:var(--bg);"></div>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <header>
    <h1 data-i18n="title">Expo Live Dashboard</h1>
    <div class="lang">
      <button type="button" data-lang="en" class="active">EN</button>
      <button type="button" data-lang="zh">ZH</button>
    </div>
  </header>
  <main>
    <div class="glass-card" style="display:flex; flex-direction:column; justify-content:center;">
      <p class="sub" data-i18n="cd_label">Countdown to event</p>
      <p class="countdown" id="cd">—</p>
      <p class="sub" id="cd_note" style="color:var(--text-muted);text-transform:none;margin-top:0.5rem;"
        data-i18n="cd_none">Target date pending.</p>
    </div>
    <div class="glass-card">
      <p class="sub" data-i18n="reg_label">Live Attendees</p>
      <p class="stat" id="total">0</p>
      <p class="sub" style="text-transform:none;color:var(--text-muted);font-size:0.85rem;margin-top:0.5rem;"
        data-i18n="reg_hint">Synchronized with front desk.</p>
      <div id="closed" class="closed" hidden data-i18n="closed">Registration Closed</div>
    </div>
    <div class="glass-card" style="grid-column: 1 / -1;">
      <p class="sub" data-i18n="by_cat">Registration Demographics</p>
      <div class="bars" id="bars"></div>
      <div id="message" class="msg" hidden></div>
    </div>
  </main>
  <footer><span data-i18n="footer">Public view — Read only</span></footer>

  <script>
    const I18N = {
      en: { title: "Expo Live Dashboard", cd_label: "T-Minus", cd_none: "Target date pending.", reg_label: "Live Attendees", reg_hint: "Synchronized with front desk.", closed: "Registration Closed", by_cat: "Registration Demographics", cat_general: "General", cat_trade: "Trade / Industry", cat_press: "Press / Media", footer: "Public view — Read only", ended: "Event Live" },
      zh: { title: "实时数据大屏", cd_label: "距离活动开始", cd_none: "待定日期。", reg_label: "实时参会人数", reg_hint: "与前台同步。", closed: "注册已关闭", by_cat: "注册人员统计", cat_general: "普通", cat_trade: "行业", cat_press: "媒体", footer: "公开视图 — 仅供参考", ended: "活动已开始" }
    };
    let lang = localStorage.getItem("expo_lang") || "en";
    function t(k) { return (I18N[lang] && I18N[lang][k]) || I18N.en[k] || k; }
    function applyLang() { document.querySelectorAll("[data-i18n]").forEach(el => { const k = el.getAttribute("data-i18n"); if (k) el.textContent = t(k); }); document.querySelectorAll(".lang button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang)); }
    document.querySelectorAll(".lang button").forEach(b => { b.addEventListener("click", () => { lang = b.dataset.lang; localStorage.setItem("expo_lang", lang); applyLang(); tick(); load(); }); });

    const labels = { general: () => t("cat_general"), trade: () => t("cat_trade"), press: () => t("cat_press") };

    function fmtCd(target) {
      const diff = target - Date.now();
      if (diff <= 0) return t("ended");
      const s = Math.floor(diff / 1000), d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      const pad = n => String(n).padStart(2, "0");
      return (d ? d + "d " : "") + `${pad(h)}:${pad(m)}:${pad(sec)}`;
    }

    let lastTarget = null;
    function tick() {
      const el = document.getElementById("cd"), note = document.getElementById("cd_note");
      if (!lastTarget) { el.textContent = "—"; note.hidden = false; return; }
      note.hidden = true; el.textContent = fmtCd(lastTarget);
    }
    setInterval(tick, 1000);

    async function load() {
      const r = await fetch("/api/public/status");
      if (!r.ok) return;
      const d = await r.json();

      const totalEl = document.getElementById("total");
      let start = parseInt(totalEl.textContent) || 0;
      const end = d.total_registered || 0;
      if (start !== end) totalEl.textContent = end;

      document.getElementById("closed").hidden = !!d.registration_open;
      const msg = document.getElementById("message");
      if (d.public_message) { msg.textContent = d.public_message; msg.hidden = false; } else { msg.hidden = true; }
      lastTarget = d.countdown_target_utc ? new Date(d.countdown_target_utc).getTime() : null;
      tick();

      const bars = document.getElementById("bars");
      bars.innerHTML = "";
      const total = Math.max(1, d.total_registered || 0);
      const c = d.count_by_category || {};
      ["general", "trade", "press"].forEach(key => {
        const n = c[key] || 0, pct = Math.round((n / total) * 100);
        const row = document.createElement("div"); row.className = "bar-row";
        row.innerHTML = `<span>${labels[key]()}</span><div class="bar-bg"><div class="bar-fill" style="width:0%"></div></div><span style="text-align:right;">${n}</span>`;
        bars.appendChild(row);
        setTimeout(() => row.querySelector('.bar-fill').style.width = pct + "%", 50);
      });
    }
    applyLang(); load(); setInterval(load, 8000);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    if(window.particlesJS) {
      particlesJS("particles-js", {"particles":{"number":{"value":60,"density":{"enable":true,"value_area":800}},"color":{"value":"#06b6d4"},"shape":{"type":"circle"},"opacity":{"value":0.4,"random":false},"size":{"value":2,"random":true},"line_linked":{"enable":true,"distance":150,"color":"#06b6d4","opacity":0.3,"width":1},"move":{"enable":true,"speed":1.5,"direction":"none","random":false,"straight":false,"out_mode":"out","bounce":false}},"interactivity":{"detect_on":"window","events":{"onhover":{"enable":true,"mode":"grab"},"onclick":{"enable":true,"mode":"push"},"resize":true},"modes":{"grab":{"distance":200,"line_linked":{"opacity":0.6}},"push":{"particles_nb":3}}},"retina_detect":true});
    }
  </script>
</body>

</html>
